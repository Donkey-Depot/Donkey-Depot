<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkey Depot | Coming Soon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #fff;
            background:
                radial-gradient(circle at top left, rgba(0,180,120,.25), transparent 35%),
                linear-gradient(135deg, #081a33, #0d3b2d);
            overflow: hidden;
        }

        .card {
            text-align: center;
            padding: 3rem;
            max-width: 700px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0px;
            backdrop-filter: blur(14px);
            box-shadow: 0 20px 50px rgba(0,0,0,.35);
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 4rem);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        p {
            font-size: 1.15rem;
            line-height: 1.7;
            color: rgba(255,255,255,0.88);
        }

        .accent {
            color: #65f5b0;
        }
        .sponsors {
    position: fixed;
    bottom: 20px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.75);
}

.ticker {
    overflow: hidden;
    white-space: nowrap;
    margin-top: 0.5rem;
}

.track {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 12s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}
    </style>
</head>
<body>
    <div class="card">
        <h1><span class="accent">Donkey Depot</span></h1>
        <p>
            Our new website is currently under construction.<br>
            We are building something exceptional, and it will be available soon for everyone.
        </p>
    </div>
    <div class="sponsors">
    <span>Supported by:</span>
    <div class="ticker">
        <div class="track">
            • Soma Siri Afrika •
        </div>
    </div>
</div>
</body>
</html>
