<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: #fff;
    background:
        radial-gradient(circle at top left, rgba(0,180,120,.25), transparent 35%),
        linear-gradient(135deg, #081a33, #0d3b2d);
}

.loader {
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,255,255,.2);
    border-top-color: #16a085;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 1rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>
 <div class="loader"></div>
